name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  rust-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-features --lib --bins --tests

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/ --ext .ts,.tsx --max-warnings 0
      - run: cd frontend && npx tsc --noEmit

  build-and-release:
    needs: [rust-format, clippy, rust-test, security-audit, gitleaks, frontend-lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libfontconfig1-dev dpkg-dev
      - name: Build frontend
        run: cd frontend && npm ci && npm run build
      - name: Build Rust release
        run: cargo build --release
      - name: Run tests
        run: cargo test --workspace --all-features
      - name: Strip binaries
        run: |
          strip target/release/fw-web target/release/fw-worker \
            target/release/fw-agent target/release/migrate-secrets
      - name: Build .deb package
        run: |
          chmod +x scripts/build-package.sh
          scripts/build-package.sh
      - name: Verify package
        run: |
          ls -la *.deb
          dpkg-deb -I linux-firewall-manager_*.deb
      - name: Generate release notes
        run: |
          echo "## Release ${GITHUB_REF#refs/tags/}" > release-notes.md
          echo "" >> release-notes.md
          git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            linux-firewall-manager_*.deb